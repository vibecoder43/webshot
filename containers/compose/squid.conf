http_port 3128

visible_hostname egress-proxy

# Keep logs in container output for easier debugging in dev/prod/CI.
access_log stdio:/dev/stdout
cache_log /dev/stderr

# No caching; this proxy is only for outbound policy enforcement.
cache deny all

# Allow cachemgr only from within the container (used for health checks).
acl loopback src 127.0.0.1/32 ::1
http_access allow manager loopback
http_access deny manager

# Safety: allow only common web ports.
acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Infra-specific rules (mounted as /etc/squid/squid.mode.conf).
include /etc/squid/squid.mode.conf

# Block destinations that are not globally routable.
acl non_public_ipv4 dst 0.0.0.0/8
acl non_public_ipv4 dst 10.0.0.0/8
acl non_public_ipv4 dst 100.64.0.0/10
acl non_public_ipv4 dst 127.0.0.0/8
acl non_public_ipv4 dst 169.254.0.0/16
acl non_public_ipv4 dst 172.16.0.0/12
acl non_public_ipv4 dst 192.0.0.0/24
acl non_public_ipv4 dst 192.0.2.0/24
acl non_public_ipv4 dst 192.88.99.0/24
acl non_public_ipv4 dst 192.168.0.0/16
acl non_public_ipv4 dst 198.18.0.0/15
acl non_public_ipv4 dst 198.51.100.0/24
acl non_public_ipv4 dst 203.0.113.0/24
acl non_public_ipv4 dst 224.0.0.0/4
acl non_public_ipv4 dst 240.0.0.0/4

acl non_public_ipv6 dst ::/128
acl non_public_ipv6 dst ::1/128
acl non_public_ipv6 dst 64:ff9b::/96
acl non_public_ipv6 dst fc00::/7
acl non_public_ipv6 dst fe80::/10
acl non_public_ipv6 dst ff00::/8
acl non_public_ipv6 dst 2001:db8::/32

http_access deny non_public_ipv4
http_access deny non_public_ipv6

# Only accept proxy clients from within the compose network (port is not
# published to the host).
http_access allow all

http_access deny all

