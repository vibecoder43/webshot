server {
    listen 80;
    server_name test-target;

    location / {
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        default_type text/html;
        return 200 '<!doctype html><html><head><title>test</title></head><body><p>text</p></body></html>';
    }
}
