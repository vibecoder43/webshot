server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    # Scalar UI under /docs (strip prefix and proxy to Scalar root)
    location /docs/ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        rewrite ^/docs/(.*)$ /$1 break;
        proxy_pass http://webshot_scalar:8080/;
    }

    # Redirect root to docs
    location = / { return 302 /docs/; }

    # Proxy API to the host service to keep Scalar "Try it out" same-origin.
    location /v1/ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://host.containers.internal:8080;
    }

    # Useful health/metrics endpoints.
    location /service/ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://host.containers.internal:8080;
    }

    # Serve OpenAPI spec directly from the host-mounted folder to allow hot edits
    location /openapi/ {
        alias /data/openapi/;
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }
}
