---
services:
    service-db:
        image: postgres:18.1-trixie
        container_name: servicedb
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - 5432:5432
        volumes:
            - type: bind
              source: ../sql/schema
              target: /docker-entrypoint-initdb.d/schema
              read_only: true
              bind:
                create_host_path: false
            - type: bind
              source: ./service-db-init-multi-db.sh
              target: /docker-entrypoint-initdb.d/10-service-db-init-multi-db.sh
              read_only: true
              bind:
                create_host_path: false
    scalar:
        image: scalarapi/api-reference:latest
        container_name: webshot_scalar
        environment:
            API_REFERENCE_CONFIG: '{"sources":[{"url":"/openapi/webshot.yaml"}],"layout":{"hideDownloadButton":false}}'
        volumes:
            - type: bind
              source: ../schemas
              target: /openapi
              read_only: true
              bind:
                create_host_path: false
    reverse-proxy:
        image: nginx:alpine
        container_name: webshot_reverse_proxy
        ports:
            - 8085:80
        volumes:
            - type: bind
              source: ./nginx.conf
              target: /etc/nginx/conf.d/default.conf
              read_only: true
              bind:
                create_host_path: false
            - type: bind
              source: ../schemas
              target: /data/openapi
              read_only: true
              bind:
                create_host_path: false
        depends_on:
            - scalar
    crawler-netkeeper:
        image: alpine:3.20
        container_name: crawler-netkeeper
        command: ["sh", "-lc", "sleep infinity"]
        restart: unless-stopped
        networks:
            - crawler_net
    seaweedfs:
        image: chrislusf/seaweedfs:latest
        container_name: seaweedfs
        command:
            - server
            - -s3
            - -filer
            - -ip.bind=0.0.0.0
            - -dir=/data
            - -volume.max=8
            - -master.volumeSizeLimitMB=32
            - -metricsPort=9324
            - -s3.config=/etc/seaweedfs/s3_config.json
        ports:
            - 8333:8333   # S3 gateway
            - 9333:9333   # master UI/API
            - 8888:8888   # filer UI/API
            - 8082:8080   # volume HTTP (moved to avoid conflict with service on 8080)
            - 9324:9324   # metrics (all-in-one)
        volumes:
            - seaweed_data:/data
            - type: bind
              source: seaweed/s3_config.json
              target: /etc/seaweedfs/s3_config.json
              read_only: true
              bind:
                create_host_path: false
        restart: unless-stopped

networks:
    crawler_net:
        name: crawler_net
        driver: bridge
        ipam:
            config:
                - subnet: 172.31.0.0/16
volumes:
    seaweed_data:
