---
services:
    capture-meta-db:
        image: postgres:18.1-trixie
        container_name: capturemetadb
        dns: ["172.17.0.1"]
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - 5432:5432
        volumes:
            - type: bind
              source: ../sql/schema/webshot_meta_db_schema.sql
              target: /docker-entrypoint-initdb.d/webshot_meta_db_schema.sql
              bind:
                create_host_path: false
    shared-state-db:
        image: postgres:18.1-trixie
        container_name: sharedstatedb
        dns: ["172.17.0.1"]
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - 5433:5432
        volumes:
            - type: bind
              source: ../sql/schema/denylist_db_schema.sql
              target: /docker-entrypoint-initdb.d/denylist_db_schema.sql
              bind:
                create_host_path: false
    webshot-test-db:
        image: postgres:18.1-trixie
        container_name: webshottestdb
        dns: ["172.17.0.1"]
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - 15434:5432
    scalar:
        image: scalarapi/api-reference:latest
        container_name: webshot_scalar
        dns: ["172.17.0.1"]
        environment:
            API_REFERENCE_CONFIG: '{"sources":[{"url":"/openapi/webshot.yaml"}],"layout":{"hideDownloadButton":false}}'
        volumes:
            - type: bind
              source: ../schemas
              target: /openapi
              read_only: true
              bind:
                create_host_path: false
    reverse-proxy:
        image: nginx:alpine
        container_name: webshot_reverse_proxy
        dns: ["172.17.0.1"]
        ports:
            - 8085:80
        volumes:
            - type: bind
              source: ./nginx.conf
              target: /etc/nginx/conf.d/default.conf
              read_only: true
              bind:
                create_host_path: false
            - type: bind
              source: ../schemas
              target: /data/openapi
              read_only: true
              bind:
                create_host_path: false
        depends_on:
            - scalar
        extra_hosts:
            - "host.docker.internal:host-gateway"
    crawler-netkeeper:
        image: alpine:3.20
        container_name: crawler-netkeeper
        command: ["sh", "-lc", "sleep infinity"]
        restart: unless-stopped
        networks:
            - crawler_net
    crawler-netpol:
        container_name: crawler-netpol
        image: alpine:3.20
        cap_add:
            - NET_ADMIN
        network_mode: host
        volumes:
            - type: bind
              source: ./docker_user_netpol.sh
              target: /usr/local/bin/docker_user_netpol.sh
              read_only: true
              bind:
                create_host_path: false
        entrypoint: ["/bin/sh", "-lc"]
        command:
            - "apk add --no-cache iptables bash jq >/dev/null 2>&1 || true; /usr/local/bin/docker_user_netpol.sh apply-cidr 172.31.0.0/16; tail -f /dev/null"
        restart: unless-stopped
networks:
    crawler_net:
        name: crawler_net
        driver: bridge
        ipam:
            config:
                - subnet: 172.31.0.0/16
