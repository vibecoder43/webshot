---
services:
    webshot-meta-db:
        image: postgres:15.10-bookworm
        container_name: webshotmetadb
        dns: ["172.17.0.1"]
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - 5432:5432
        volumes:
            - type: bind
              source: ./sql/schema/webshot_meta_db_schema.sql
              target: /docker-entrypoint-initdb.d/webshot_meta_db_schema.sql
    webshot-denylist-db:
        image: postgres:15.10-bookworm
        container_name: webshotdenylistdb
        dns: ["172.17.0.1"]
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - 5433:5432
        volumes:
            - type: bind
              source: ./sql/schema/denylist_db_schema.sql
              target: /docker-entrypoint-initdb.d/denylist_db_schema.sql
    webshot-test-db:
        image: postgres:15.10-bookworm
        container_name: webshottestdb
        dns: ["172.17.0.1"]
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - 15434:5432
    scalar:
        image: scalarapi/api-reference:latest
        container_name: webshot_scalar
        dns: ["172.17.0.1"]
        environment:
            API_REFERENCE_CONFIG: '{"sources":[{"url":"/openapi/webshot.yaml"}],"layout":{"hideDownloadButton":false}}'
        volumes:
            - type: bind
              source: ./schemas
              target: /openapi
              read_only: true
    reverse-proxy:
        image: nginx:alpine
        container_name: webshot_reverse_proxy
        dns: ["172.17.0.1"]
        ports:
            - 8085:80
        volumes:
            - type: bind
              source: ./docker/nginx.conf
              target: /etc/nginx/conf.d/default.conf
              read_only: true
            - type: bind
              source: ./schemas
              target: /data/openapi
              read_only: true
        depends_on:
            - scalar
        extra_hosts:
            - "host.docker.internal:host-gateway"
    crawler-netkeeper:
        image: alpine:3.20
        container_name: crawler-netkeeper
        command: ["sh", "-lc", "sleep infinity"]
        restart: unless-stopped
        networks:
            - crawler_net
    crawler-netpol:
        container_name: crawler-netpol
        image: alpine:3.20
        cap_add:
            - NET_ADMIN
        network_mode: host
        volumes:
            - ./docker/docker_user_netpol.sh:/usr/local/bin/docker_user_netpol.sh:ro
        entrypoint: ["/bin/sh", "-lc"]
        command:
            - "apk add --no-cache iptables bash jq >/dev/null 2>&1 || true; /usr/local/bin/docker_user_netpol.sh apply-cidr 172.31.0.0/16; tail -f /dev/null"
        restart: unless-stopped
    seaweedfs:
        image: chrislusf/seaweedfs:latest
        container_name: seaweedfs
        command:
            - server
            - -s3
            - -filer
            - -ip.bind=0.0.0.0
            - -dir=/data
            - -metricsPort=9324
            - -s3.config=/etc/seaweedfs/s3_config.json
        ports:
            - 8333:8333   # S3 gateway
            - 9333:9333   # master UI/API
            - 8888:8888   # filer UI/API
            - 8082:8080   # volume HTTP (moved to avoid conflict with service on 8080)
            - 9324:9324   # metrics (all-in-one)
        volumes:
            - seaweed_data:/data
            - type: bind
              source: ./docker/seaweed/s3_config.json
              target: /etc/seaweedfs/s3_config.json
              read_only: true
        restart: unless-stopped

networks:
    crawler_net:
        name: crawler_net
        driver: bridge
        ipam:
            config:
                - subnet: 172.31.0.0/16
volumes:
    seaweed_data:
