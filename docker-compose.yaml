services:
    webshot-meta-db:
        image: postgres:15.10-bookworm
        container_name: webshotmetadb
        dns: ["172.17.0.1"]
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - 5432:5432
        volumes:
            - type: bind
              source: ./sql/schema/webshot_meta_db_schema.sql
              target: /docker-entrypoint-initdb.d/webshot_meta_db_schema.sql
    webshot-denylist-db:
        image: postgres:15.10-bookworm
        container_name: webshotdenylistdb
        dns: ["172.17.0.1"]
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - 5433:5432
        volumes:
            - type: bind
              source: ./sql/schema/denylist_db_schema.sql
              target: /docker-entrypoint-initdb.d/denylist_db_schema.sql
    webshot-storage-server:
        image: nginx:alpine
        container_name: webshot_storage_server
        dns: ["172.17.0.1"]
        ports:
            - 8081:80
        volumes:
            - type: bind
              source: /tmp/build-webshot-san/wacz
              target: /usr/share/nginx/html
              read_only: true
            - type: bind
              source: ./docker/storage-nginx.conf
              target: /etc/nginx/conf.d/default.conf
              read_only: true
    scalar:
        image: scalarapi/api-reference:latest
        container_name: webshot_scalar
        dns: ["172.17.0.1"]
        environment:
            API_REFERENCE_CONFIG: '{"sources":[{"url":"/openapi/webshot.yaml"}],"layout":{"hideDownloadButton":false}}'
        volumes:
            - type: bind
              source: ./schemas
              target: /openapi
              read_only: true
    reverse-proxy:
        image: nginx:alpine
        container_name: webshot_reverse_proxy
        dns: ["172.17.0.1"]
        ports:
            - 8085:80
        volumes:
            - type: bind
              source: ./docker/nginx.conf
              target: /etc/nginx/conf.d/default.conf
              read_only: true
            - type: bind
              source: ./schemas
              target: /data/openapi
              read_only: true
        depends_on:
            - scalar
        extra_hosts:
            - "host.docker.internal:host-gateway"
    crawler-netkeeper:
        image: alpine:3.20
        container_name: crawler-netkeeper
        command: ["sh","-lc","sleep infinity"]
        restart: unless-stopped
        networks:
            - crawler_net
    crawler-netpol:
        container_name: crawler-netpol
        image: alpine:3.20
        cap_add:
            - NET_ADMIN
        network_mode: host
        volumes:
            - ./docker/docker_user_netpol.sh:/usr/local/bin/docker_user_netpol.sh:ro
        entrypoint: ["/bin/sh","-lc"]
        command: 
            - "apk add --no-cache iptables bash jq >/dev/null 2>&1 || true; /usr/local/bin/docker_user_netpol.sh apply-cidr 172.31.0.0/16; tail -f /dev/null"
        restart: unless-stopped

networks:
    crawler_net:
        name: crawler_net
        driver: bridge
        ipam:
            config:
                - subnet: 172.31.0.0/16
