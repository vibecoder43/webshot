worker_processes 1;
error_log stderr info;

events {}

http {
    access_log /dev/stdout;

    server {
        listen 18080;
        server_name test-target;

        location /https-first-http-fails {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 444;
        }

        location /http-fallback-success {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><title>ok</title></head><body><p>ok</p></body></html>';
        }

        location /http-fallback-fail {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 444;
        }

        location /redirect-seed {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            return 302 /redirect-final;
        }

        location /redirect-final {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><title>Redirect Final</title></head><body><p>redirect final</p></body></html>';
        }

        location /with-subresource {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><title>test</title><link rel="stylesheet" href="/style.css"><script src="/script.js"></script></head><body><p>text</p></body></html>';
        }

        location /with-post-subresource {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><title>Seed With Post Fetch</title></head><body><script type="module">await fetch("/submit?source=page", { method: "POST", headers: { "content-type": "text/plain; charset=utf-8" }, body: "hello=world" });</script></body></html>';
        }

        location = /submit {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/plain;
            return 200 'submitted';
        }

        location /with-head-subresource {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><title>Seed With Head Fetch</title></head><body><script type="module">await fetch("/metadata?source=page", { method: "HEAD" });</script></body></html>';
        }

        location = /metadata {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/plain;
            return 200 'metadata!';
        }

        location /style.css {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/css;
            return 200 'body { background: #fff; }';
        }

        location /script.js {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type application/javascript;
            return 200 'console.log("ok");';
        }

        location /with-redirected-asset {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><title>Seed With Redirected Asset</title><script defer src="/redirect-script.js"></script></head><body><p>text</p></body></html>';
        }

        location = /redirect-script.js {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            return 302 /script-final.js;
        }

        location = /script-final.js {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type application/javascript;
            return 200 'window.__redirectedAssetLoaded = true;';
        }

        location /with-subresource-denylist {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><title>test</title><link rel="stylesheet" href="/denylist/style.css"><script src="/denylist/script.js"></script></head><body><p>text</p></body></html>';
        }

        location /state-write {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            add_header Set-Cookie "seen=first; Path=/" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><title>First Run</title></head><body><script>localStorage.setItem("shared", "first"); sessionStorage.setItem("shared", "first"); document.body.textContent = "state written";</script></body></html>';
        }

        location /state-read {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><title>Second Run</title></head><body><script>document.body.textContent = JSON.stringify({cookie: document.cookie, localStorage: localStorage.getItem("shared"), sessionStorage: sessionStorage.getItem("shared")});</script></body></html>';
        }

        location /with-https-asset-subresource {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><title>test</title><link rel="stylesheet" href="https://asset.test-target/asset.css"><script src="https://asset.test-target/asset.js"></script></head><body><p>text</p></body></html>';
        }

        location /with-https-asset-subresource-denylist {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><title>test</title><link rel="stylesheet" href="https://asset.test-target/denylist/asset.css"><script src="https://asset.test-target/denylist/asset.js"></script></head><body><p>text</p></body></html>';
        }

        location /denylist/style.css {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/css;
            return 200 'body { background: #eee; }';
        }

        location /denylist/script.js {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type application/javascript;
            return 200 'console.log("denylist");';
        }

        location / {
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><title>test</title></head><body><p>text</p></body></html>';
        }
    }

