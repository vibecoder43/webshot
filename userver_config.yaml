components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: &blocking_num_workers 1
    default_task_processor: main-task-processor
    components:
        webshot-config:
            query-part-length-max: 1024
        dns-client:
            fs-task-processor: fs-task-processor
        testsuite-support:
        server:
            listener:
                port: 8080
                task_processor: main-task-processor
        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: debug
                    overflow_behavior: discard
        webshots-by-prefix:
            path: /v1/webshot
            method: GET
            task_processor: main-task-processor
        webshot-exact:
            path: /v1/webshot/exact
            method: GET
            task_processor: main-task-processor
        webshot-handler:
            path: /v1/webshot
            method: POST
            task_processor: main-task-processor
        webshot-by-id:
            path: /v1/webshot/{uuid}
            method: GET
            task_processor: main-task-processor
        webshot-crud:
            webshot-root: '/tmp/build-webshot-san/wacz'
            webshots-page-max: 2
            webshot-storage-url: 'http://localhost:8081'
            crawl-concurrency: *blocking_num_workers
            webshots-per-link-max: 2
            webshots-links-per-page-max: 10
            crawler-network: 'crawler_net'
        webshot-meta-db:
            dbconnection: 'postgresql://postgres@localhost:5432'
            blocking_task_processor: fs-task-processor
        denylist-db:
            dbconnection: 'postgresql://postgres@localhost:5433'
            blocking_task_processor: fs-task-processor
        webshot-denylist:
