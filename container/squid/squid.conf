http_port 3128 ssl-bump cert=/etc/squid/webshot_ca.pem generate-host-certificates=on dynamic_cert_mem_cache_size=16MB

visible_hostname egress_proxy

# Squid drops privileges to `cache_effective_user`; make the runtime user
# explicit so startup stays deterministic across environments.
cache_effective_user proxy

# Nix's Squid defaults pid_filename to $prefix/var/run/squid.pid inside the
# immutable store. Override it to a writable runtime path.
pid_filename /tmp/squid.pid

# Keep logs on stdio for easier debugging in local runs and CI.
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr

# No caching; this proxy is only for outbound policy enforcement.
cache deny all

# Allow cachemgr only from loopback for local health checks.
acl loopback src 127.0.0.1/32 ::1
http_access allow manager loopback
http_access deny manager

# Safety: allow only common web ports.
acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# TLS MITM: bump all TLS so Squid can evaluate full URLs (host+path).
# ssl_db initialization and sslcrtd_program selection are handled by the native runtime.
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/squid/ssl_db -M 16MB
sslcrtd_children 5

acl bump_step1 at_step SslBump1
ssl_bump peek bump_step1
ssl_bump bump all

# URL denylist enforcement via Webshot (authoritative) using an external ACL helper.
# Helper returns OK for blocked URLs and ERR for allowed URLs.
external_acl_type webshot_denylist ttl=0 negative_ttl=0 children-max=20 children-startup=20 %URI /usr/local/bin/webshot_denylist_acl.sh
acl url_denylisted external webshot_denylist

# Denylist blocks (host+path) after ssl_bump makes full URLs visible.
# This must come before any mode-specific http_access allow rules.
http_access deny url_denylisted

# Mode-specific rules are rendered into the generated Squid config.
include /etc/squid/squid.mode.conf

# Block destinations that are not globally routable.
acl non_public_ipv4 dst 0.0.0.0/8
acl non_public_ipv4 dst 10.0.0.0/8
acl non_public_ipv4 dst 100.64.0.0/10
acl non_public_ipv4 dst 127.0.0.0/8
acl non_public_ipv4 dst 169.254.0.0/16
acl non_public_ipv4 dst 172.16.0.0/12
acl non_public_ipv4 dst 192.0.0.0/24
acl non_public_ipv4 dst 192.0.2.0/24
acl non_public_ipv4 dst 192.88.99.0/24
acl non_public_ipv4 dst 192.168.0.0/16
acl non_public_ipv4 dst 198.18.0.0/15
acl non_public_ipv4 dst 198.51.100.0/24
acl non_public_ipv4 dst 203.0.113.0/24
acl non_public_ipv4 dst 224.0.0.0/4
acl non_public_ipv4 dst 240.0.0.0/4

acl non_public_ipv6 dst ::/128
acl non_public_ipv6 dst ::1/128
acl non_public_ipv6 dst 64:ff9b::/96
acl non_public_ipv6 dst fc00::/7
acl non_public_ipv6 dst fe80::/10
acl non_public_ipv6 dst ff00::/8
acl non_public_ipv6 dst 2001:db8::/32

http_access deny non_public_ipv4
http_access deny non_public_ipv6

http_access allow all

http_access deny all
