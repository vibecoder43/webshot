server {
    listen 80;
    listen 443 ssl;
    server_name asset.test-target;

    ssl_certificate /etc/nginx/ssl/test_target.crt;
    ssl_certificate_key /etc/nginx/ssl/test_target.key;

    location /asset.css {
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        default_type text/css;
        return 200 'body { color: #000; }';
    }

    location /asset.js {
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        default_type application/javascript;
        return 200 'console.log("asset");';
    }

    location /denylist/asset.css {
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        default_type text/css;
        return 200 'body { color: #111; }';
    }

    location /denylist/asset.js {
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        default_type application/javascript;
        return 200 'console.log("asset-denylist");';
    }

    location / {
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        default_type text/plain;
        return 200 'asset';
    }
}
