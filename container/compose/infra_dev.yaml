version: "3.9"
services:
  egress_proxy:
    container_name: egress_proxy
    image: localhost/squid:dev
    command: ["/bin/sh", "/usr/local/bin/squid_start.sh"]
    networks:
      - egress_net
      - crawler_net
    extra_hosts:
      - "host.containers.internal:host-gateway"
    volumes:
      - ../squid/squid.conf:/etc/squid/squid.conf:ro
      - ../squid/squid.mode.dev.conf:/etc/squid/squid.mode.conf:ro
      - ./pki/squid_ca.pem:/etc/squid/webshot_ca.pem:ro
      - ./pki/origin_ca.crt:/usr/local/share/ca-certificates/webshot-test-target-origin-ca.crt:ro
      - ../squid/squid_start.sh:/usr/local/bin/squid_start.sh:ro
      - ../squid/webshot_denylist_acl.sh:/usr/local/bin/webshot_denylist_acl.sh:ro
      - ../squid/healthcheck_squid.sh:/usr/local/bin/healthcheck_squid.sh:ro
    healthcheck:
      test: ["CMD", "/bin/sh", "/usr/local/bin/healthcheck_squid.sh"]
      interval: disable
      start_period: 20s
      timeout: 2s
      retries: 60
  servicedb:
    container_name: servicedb
    image: docker.io/postgres:18.1-trixie@sha256:5ec39c188013123927f30a006987c6b0e20f3ef2b54b140dfa96dac6844d883f
    command: ["postgres", "-c", "timezone=UTC", "-c", "log_timezone=UTC"]
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ../../sql/schema:/docker-entrypoint-initdb.d/schema:ro
      - ../../container/service_db_init_multi_db.sh:/docker-entrypoint-initdb.d/10_service_db_init_multi_db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres"]
      interval: disable
      start_period: 20s
      timeout: 2s
      retries: 60
  seaweedfs:
    container_name: seaweedfs
    image: docker.io/chrislusf/seaweedfs:latest@sha256:fef02554ebd5093d2f99699c44b846fb316b95be5ea8bd82677c2737ad516631
    command:
      - server
      - -s3
      - -filer
      - -ip.bind=0.0.0.0
      - -dir=/data
      - -master.volumeSizeLimitMB=32
      - -metricsPort=9324
      - -s3.config=/etc/seaweedfs/s3_config.json
    ports:
      - "127.0.0.1:8333:8333"
      - "127.0.0.1:9333:9333"
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:8082:8080"
      - "127.0.0.1:9324:9324"
    volumes:
      - ../../container/seaweed/s3_config.json:/etc/seaweedfs/s3_config.json:ro
      - ../../container/seaweed/healthcheck_seaweedfs.sh:/usr/local/bin/healthcheck_seaweedfs.sh:ro
    healthcheck:
      test: ["CMD", "/bin/sh", "/usr/local/bin/healthcheck_seaweedfs.sh"]
      interval: disable
      start_period: 40s
      timeout: 5s
      retries: 60
    stop_grace_period: 60s
  scalar:
    container_name: scalar
    image: docker.io/scalarapi/api-reference:latest@sha256:9ae2aa3829488d273de33ebd21a4446a4b0fd19107b355689dca43abfb846ec8
    networks:
      - crawler_net
    environment:
      API_REFERENCE_CONFIG: '{"sources":[{"url":"/openapi/webshot.yaml"}],"layout":{"hideDownloadButton":false}}'
    volumes:
      - ../../schema:/docs:ro
      - ../../container/scalar/Caddyfile:/etc/caddy/Caddyfile:ro
  reverse_proxy:
    container_name: reverse_proxy
    image: docker.io/nginx:alpine@sha256:b3c656d55d7ad751196f21b7fd2e8d4da9cb430e32f646adcf92441b72f82b14
    networks:
      - egress_net
      - crawler_net
    extra_hosts:
      - "host.containers.internal:host-gateway"
    ports:
      - "127.0.0.1:8085:8085"
    volumes:
      - ../../container/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../schema:/data/openapi:ro
    depends_on:
      - scalar
  test_target:
    container_name: test_target
    image: docker.io/nginx:alpine@sha256:b3c656d55d7ad751196f21b7fd2e8d4da9cb430e32f646adcf92441b72f82b14
    networks:
      crawler_net:
        aliases:
          - test-target
          - asset.test-target
    volumes:
      - ../../container/nginx_test.conf:/etc/nginx/conf.d/default.conf:ro
      - ./pki/test_target.crt:/etc/nginx/ssl/test_target.crt:ro
      - ./pki/test_target.key:/etc/nginx/ssl/test_target.key:ro
networks:
  crawler_net:
    name: crawler_net
    external: true
  egress_net:
    name: egress_net
    external: true
