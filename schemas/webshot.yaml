openapi: 3.0.3
info:
  title: Webshot Service API
  version: 0.1.0
servers:
  - url: /

paths:
  /v1/webshot:
    get:
      operationId: listWebshotsByUrl
      summary: List capture UUIDs by URL
      description: Returns an array of captures for the given URL (latest first).
      parameters:
        - in: query
          name: url
          required: true
          schema:
            type: string
            format: uri
          description: Page URL to list.
          example: https://google.com
      responses:
        '200':
          description: Array of captures (latest first).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindWebshotByUrlResponse'
        '400':
          description: Bad request (invalid URL).
        '404':
          description: No captures found for the given URL.
    post:
      operationId: createWebshot
      summary: Enqueue capture of a webshot
      description: Triggers asynchronous capture of the provided URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebshotRequest'
      responses:
        '201':
          description: Capture accepted for processing.
        '400':
          description: Invalid JSON or URL supplied.

  /v1/webshot/{uuid}:
    get:
      operationId: getWebshotByUuid
      summary: Redirect to stored WACZ by UUID
      parameters:
        - in: path
          name: uuid
          required: true
          description: UUIDv4 of the capture.
          schema:
            type: string
            format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        '302':
          description: Found; Location header points to the stored WACZ.
          headers:
            Location:
              description: Canonical storage URL of the WACZ file.
              schema:
                type: string
                format: uri
        '404':
          description: Webshot not found.

components:
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string
    CreateWebshotRequest:
      type: object
      additionalProperties: false
      required: [url]
      properties:
        url:
          type: string
          format: uri
          example: https://google.com
    UuidWithTime:
      type: object
      additionalProperties: false
      required: [uuid, created_at]
      properties:
        uuid:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
        created_at:
          type: string
          format: date-time
          example: 2025-11-11T12:34:56+00:00
    FindWebshotByUrlResponse:
      type: array
      items:
        $ref: '#/components/schemas/UuidWithTime'
      example:
        - uuid: 123e4567-e89b-12d3-a456-426614174000
          created_at: 2025-11-11T12:34:56+00:00
