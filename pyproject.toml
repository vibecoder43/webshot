[tool.ruff]
line-length = 100
target-version = "py313"
[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
    # pep8-naming
    "N",
]

[tool.sqlfluff.core]
dialect = "postgres"
max_line_length = 100
exclude_rules = ["RF04"]
