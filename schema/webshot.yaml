openapi: 3.0.3
info:
  title: Webshot Service API
  version: 0.1.0
servers:
  - url: /
paths:
  /v1/webshot:
    get:
      operationId: listWebshotsByUrl
      summary: List captures by exact link (paged)
      description: |
        Returns a paged list of captures for the exact normalized link.

        Ordering and paging:
        - Items are ordered by created_at (descending), then by UUID (ascending).
        - The page_token is opaque; it resumes after the last item of the previous page.
      parameters:
        - in: query
          name: link
          required: true
          description: Exact link to list. Accepts a full HTTP/HTTPS link or a link without scheme (host with optional path/query). The server normalizes scheme and host.
          schema:
            $ref: '#/components/schemas/Link'
          examples:
            full-url:
              value: https://example.com/a?b=1
            host-without-scheme:
              value: example.com/a?b=1
        - in: query
          name: page_token
          required: false
          schema:
            type: string
          description: Opaque token from a previous response to get the next page.
      responses:
        '200':
          description: Paged list of captures (latest first).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedFindWebshotByUrlResponse'
        '400':
          description: Bad request (invalid URL or pagination parameters).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                missing_link:
                  value:
                    error:
                      message: "missing parameter: link"
                bad_page_token:
                  value:
                    error:
                      message: invalid page_token
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      operationId: createWebshot
      summary: Enqueue a capture job and return its status
      description: |
        Enqueues a background capture job for the provided URL and returns an initial
        job descriptor. The returned UUID is the same identifier that will be used
        for the stored capture once the job succeeds. Clients should poll
        `/v1/webshot/jobs/{uuid}` to observe completion.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebshotRequest'
            examples:
              full-url:
                summary: Full HTTP URL
                value:
                  link: https://example.com/path?q=1
              host-without-scheme:
                summary: Host with optional path
                value:
                  link: example.com/path?q=1
      responses:
        '202':
          description: Capture job enqueued; job descriptor returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebshotJob'
        '400':
          description: Invalid JSON or URL supplied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                bad_request:
                  value:
                    error:
                      message: invalid request body
                bad_link:
                  value:
                    error:
                      message: forbidden host
        '403':
          description: Host is denylisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                denylisted:
                  value:
                    error:
                      message: host in denylist
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/webshot/prefix:
    get:
      operationId: listWebshotsByPrefix
      summary: List capture UUIDs by link prefix
      description: |
        Returns captures for links whose normalized scheme-less form starts with the provided prefix.

        Ordering and paging:
        - Results are ordered by link (ascending), then by created_at (descending), then by UUID (ascending).
        - Each page includes up to N distinct links and up to M newest captures per link; N and M are server-configured caps.
        - The page_token is opaque; it may resume within a specific link or advance to the next link group.
      parameters:
        - in: query
          name: prefix
          required: true
          description: Link prefix. Must include a full host; accepts a full HTTP/HTTPS link or a link without scheme.
          schema:
            $ref: '#/components/schemas/Link'
          examples:
            host-prefix:
              value: example.com/a
            absolute-prefix:
              value: https://example.com/a
        - in: query
          name: page_token
          required: false
          schema:
            type: string
          description: Opaque token from a previous response to get the next page.
      responses:
        '200':
          description: Paged list of captures matching the prefix (latest first).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedFindWebshotByPrefixResponse'
        '400':
          description: Bad request (invalid prefix or pagination parameters).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                missing_prefix:
                  value:
                    error:
                      message: "missing parameter: prefix"
                bad_page_token:
                  value:
                    error:
                      message: invalid page_token
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/webshot/jobs/{uuid}:
    get:
      operationId: getWebshotJob
      summary: Get capture job status by UUID
      parameters:
        - in: path
          name: uuid
          required: true
          description: UUIDv4 of the capture job (and eventual capture).
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job found; current status returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebshotJob'
        '400':
          description: Bad request (missing or invalid UUID path parameter).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_uuid:
                  value:
                    error:
                      message: "invalid uuid"
        '404':
          description: Job not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                not_found:
                  value:
                    error:
                      message: job not found
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/disallow-and-purge:
    post:
      operationId: disallowAndPurgePrefix
      summary: Disallow a host prefix and enqueue purge
      description: |
        Normalizes the provided host or URL, derives a host+path prefix, inserts it into the
        denylist, and enqueues background purge of all captures matching that prefix.
      parameters:
        - in: query
          name: host
          required: true
          description: |
            Host or URL prefix to disallow. Accepts a full HTTP/HTTPS link or a bare hostname;
            the normalized host and path (without query) are used for denylisting.
          schema:
            type: string
          examples:
            simple:
              value: example.com
            idn:
              value: "bücher.de"
      responses:
        '202':
          description: Purge successfully enqueued for the normalized prefix.
        '400':
          description: Invalid or missing host parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                missing_host:
                  value:
                    error:
                      message: "missing parameter: host"
                invalid_host:
                  value:
                    error:
                      message: "invalid host"
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/webshot/{uuid}:
    get:
      operationId: getWebshotByUuid
      summary: Redirect to stored WACZ by UUID
      parameters:
        - in: path
          name: uuid
          required: true
          description: UUIDv4 of the capture.
          schema:
            type: string
            format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        '302':
          description: Found; Location header points to the stored WACZ.
          headers:
            Location:
              description: Canonical storage URL of the WACZ file.
              schema:
                type: string
                format: uri
        '400':
          description: Bad request (missing or invalid UUID path parameter).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                missing_uuid:
                  value:
                    error:
                      message: "missing parameter: uuid"
        '404':
          description: Webshot not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                not_found:
                  value:
                    error:
                      message: webshot not found
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    PaginationCursor:
      type: object
      additionalProperties: false
      required: [t, i]
      description: Opaque pagination cursor; microsecond epoch and UUID of last item
      properties:
        t:
          type: integer
          format: int64
          description: Microseconds since Unix epoch
          example: 1763037596000000
        i:
          type: string
          format: uuid
          description: UUID of the last item on the previous page
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [message]
          properties:
            message:
              type: string
      example:
        error:
          message: internal server error
    CreateWebshotRequest:
      type: object
      additionalProperties: false
      required: [link]
      properties:
        link:
          $ref: '#/components/schemas/Link'
    Link:
      type: string
      description: "Either an absolute HTTP/HTTPS link (e.g., https://example.com/a) or a link without scheme (e.g., example.com/a). Must not start with '/'. Hostnames only; IP literals (IPv4/IPv6) are not allowed."
      pattern: ^(?:[Hh][Tt][Tt][Pp][Ss]?://|[^/].+)$
    UuidWithTime:
      type: object
      additionalProperties: false
      required: [uuid, created_at]
      properties:
        uuid:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
        created_at:
          type: string
          format: date-time
          example: 2025-11-11T12:34:56+00:00
    PagedFindWebshotByUrlResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UuidWithTime'
        next_page_token:
          type: string
          nullable: true
      required: [items, next_page_token]
      example:
        items:
          - uuid: 123e4567-e89b-12d3-a456-426614174000
            created_at: 2025-11-11T12:34:56+00:00
        next_page_token: eyJ0IjoxNjk5ODMyMDAwMDAwLCJpIjoiMTIzZTQ1NjctZTg5Yi0xMmQzLWE0NTYtNDI2NjE0MTc0MDAwIn0
    UuidWithTimeLink:
      type: object
      additionalProperties: false
      required: [uuid, created_at, link]
      properties:
        uuid:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        link:
          type: string
      example:
        uuid: 123e4567-e89b-12d3-a456-426614174000
        created_at: 2025-11-11T12:34:56+00:00
        link: example.com/a
    WebshotJob:
      type: object
      additionalProperties: false
      required: [uuid, link, status, created_at]
      properties:
        uuid:
          type: string
          format: uuid
        link:
          type: string
          description: Normalized scheme-less link
        status:
          type: string
          description: Current job status
          enum: [pending, running, succeeded, failed]
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        result_created_at:
          type: string
          format: date-time
          nullable: true
          description: created_at of the stored capture, when succeeded
        result:
          $ref: '#/components/schemas/UuidWithTimeLink'
        error:
          $ref: '#/components/schemas/ErrorEnvelope'
      example:
        uuid: 123e4567-e89b-12d3-a456-426614174000
        link: example.com/a
        status: pending
        created_at: 2025-11-11T12:34:56+00:00
    PagedFindWebshotByPrefixResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UuidWithTimeLink'
        next_page_token:
          type: string
          nullable: true
      required: [items, next_page_token]
    PaginationPrefixCursor:
      type: object
      additionalProperties: false
      description: Opaque pagination cursor for prefix search
      required: [p, l]
      properties:
        p:
          type: string
          description: Normalized prefix
        l:
          type: string
          description: Last link processed
        t:
          type: integer
          format: int64
          nullable: true
          description: Microseconds since Unix epoch of last item
        i:
          type: string
          format: uuid
          nullable: true
          description: UUID of last item when resuming mid-link
