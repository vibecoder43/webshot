openapi: 3.0.3
info:
  title: Webshot Common API Schemas
  version: unversioned
paths: {}
components:
  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [message]
          properties:
            message:
              type: string
      example:
        error:
          message: internal server error
    Link:
      type: string
      description: "Either an absolute HTTP/HTTPS link (e.g., https://example.com/a) or a link without scheme (e.g., example.com/a). Must not start with '/'. Hostnames only; IP literals (IPv4/IPv6) are not allowed. When HTTPS-only mode is enabled, HTTP inputs are accepted but crawler egress uses HTTPS only."
      pattern: ^(?:[Hh][Tt][Tt][Pp][Ss]?://|[^/].+)$
