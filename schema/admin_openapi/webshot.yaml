openapi: 3.0.3
info:
  title: Webshot Admin API
  version: 0.1.0
servers:
  - url: /
paths:
  /v1/denylist/check:
    post:
      operationId: checkDenylist
      summary: Check whether a link is denylisted
      description: |
        Checks whether the provided link is allowed under the current denylist.

        The request body is the raw link text (not JSON). The service normalizes the link
        (defaulting scheme to http when absent) and checks the derived denylist prefix.
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              $ref: '#/components/schemas/Link'
            examples:
              absolute:
                value: https://example.com/a?b=1
              host-without-scheme:
                value: example.com/a?b=1
          application/octet-stream:
            schema:
              $ref: '#/components/schemas/Link'
      responses:
        '204':
          description: Link is allowed (not denylisted).
        '400':
          description: Missing or invalid request body.
        '403':
          description: Link is denylisted.
        '500':
          description: Internal server error.
  /v1/denylist/disallow_and_purge:
    post:
      operationId: disallowAndPurgePrefix
      summary: Disallow a host prefix and enqueue purge
      description: |
        Normalizes the provided host or URL, derives a host+path prefix, inserts it into the
        denylist, and enqueues background purge of all captures matching that prefix.

        Port and query are ignored for denylisting; only the normalized host and path are used.
      parameters:
        - in: query
          name: host
          required: true
          description: |
            Host or URL prefix to disallow. Accepts a full HTTP/HTTPS link or a bare hostname;
            the normalized host and path (without query) are used for denylisting.
          schema:
            $ref: '#/components/schemas/Link'
          examples:
            simple:
              value: example.com
            idn:
              value: bucher.de
      responses:
        '202':
          description: Purge successfully enqueued for the normalized prefix.
        '400':
          description: Invalid or missing host parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                missing_host:
                  value:
                    error:
                      message: "host: missing parameter"
                invalid_host:
                  value:
                    error:
                      message: "host: invalid parameter"
        '429':
          description: Client IP is still in cooldown.
          headers:
            Retry-After:
              description: Seconds until this client IP may perform another operation.
              schema:
                type: integer
                minimum: 1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                ip_cooldown:
                  value:
                    error:
                      message: client IP in cooldown
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [message]
          properties:
            message:
              type: string
      example:
        error:
          message: internal server error
    Link:
      type: string
      description: "Either an absolute HTTP/HTTPS link (e.g., https://example.com/a) or a link without scheme (e.g., example.com/a). Must not start with '/'. Hostnames only; IP literals (IPv4/IPv6) are not allowed."
      pattern: ^(?:[Hh][Tt][Tt][Pp][Ss]?://|[^/].+)$
