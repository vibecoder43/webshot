openapi: 3.0.3
info:
  title: Internal Chromium DevTools Protocol shapes used by webshotd
  version: 0.1.0
paths: {}
components:
  schemas:
    CdpEmptyObject:
      type: object
      additionalProperties: false
    CdpHeaders:
      type: object
      additionalProperties:
        type: string
    CdpError:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        code:
          type: integer
          format: int64
        message:
          type: string
        data:
          type: string
    CdpCommandRequest:
      type: object
      additionalProperties: false
      required: [id, method]
      properties:
        id:
          type: integer
          format: int64
        method:
          type: string
        params:
          type: object
          additionalProperties: true
        sessionId:
          type: string
    CdpEventMessage:
      type: object
      additionalProperties: false
      required: [method]
      properties:
        method:
          type: string
        params:
          type: object
          additionalProperties: true
        sessionId:
          type: string
    DevtoolsVersionResponse:
      type: object
      additionalProperties: false
      required: [webSocketDebuggerUrl]
      properties:
        webSocketDebuggerUrl:
          type: string
    TargetTargetCrashedEvent:
      type: object
      additionalProperties: true
      properties:
        targetId:
          type: string
    TargetCreateBrowserContextResult:
      type: object
      additionalProperties: false
      required: [browserContextId]
      properties:
        browserContextId:
          type: string
    TargetCreateTargetParams:
      type: object
      additionalProperties: false
      required: [url, browserContextId]
      properties:
        url:
          type: string
        browserContextId:
          type: string
    TargetCreateTargetResult:
      type: object
      additionalProperties: false
      required: [targetId]
      properties:
        targetId:
          type: string
    TargetAttachToTargetParams:
      type: object
      additionalProperties: false
      required: [targetId, flatten]
      properties:
        targetId:
          type: string
        flatten:
          type: boolean
    TargetAttachToTargetResult:
      type: object
      additionalProperties: false
      required: [sessionId]
      properties:
        sessionId:
          type: string
    TargetDetachFromTargetParams:
      type: object
      additionalProperties: false
      required: [sessionId]
      properties:
        sessionId:
          type: string
    TargetDisposeBrowserContextParams:
      type: object
      additionalProperties: false
      required: [browserContextId]
      properties:
        browserContextId:
          type: string
    PageSetLifecycleEventsEnabledParams:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled:
          type: boolean
    PageFrameTreeFrame:
      type: object
      additionalProperties: true
      required: [id]
      properties:
        id:
          type: string
    PageFrameTree:
      type: object
      additionalProperties: true
      required: [frame]
      properties:
        frame:
          $ref: "#/components/schemas/PageFrameTreeFrame"
    PageGetFrameTreeResult:
      type: object
      additionalProperties: false
      required: [frameTree]
      properties:
        frameTree:
          $ref: "#/components/schemas/PageFrameTree"
    PageCreateIsolatedWorldParams:
      type: object
      additionalProperties: false
      required: [frameId]
      properties:
        frameId:
          type: string
        worldName:
          type: string
        grantUniveralAccess:
          type: boolean
    PageCreateIsolatedWorldResult:
      type: object
      additionalProperties: false
      required: [executionContextId]
      properties:
        executionContextId:
          type: integer
          format: int64
    PageNavigateParams:
      type: object
      additionalProperties: false
      required: [url]
      properties:
        url:
          type: string
    PageNavigateResult:
      type: object
      additionalProperties: false
      required: [frameId]
      properties:
        frameId:
          type: string
        loaderId:
          type: string
        errorText:
          type: string
        isDownload:
          type: boolean
    NetworkRequest:
      type: object
      additionalProperties: true
      required: [url, method]
      properties:
        url:
          type: string
        method:
          type: string
    NetworkResponse:
      type: object
      additionalProperties: true
      properties:
        url:
          type: string
        status:
          type: integer
          format: int64
        statusText:
          type: string
        headers:
          $ref: "#/components/schemas/CdpHeaders"
    NetworkRequestWillBeSentEvent:
      type: object
      additionalProperties: true
      required: [requestId, request]
      properties:
        requestId:
          type: string
        loaderId:
          type: string
        frameId:
          type: string
        type:
          type: string
        request:
          $ref: "#/components/schemas/NetworkRequest"
        redirectResponse:
          $ref: "#/components/schemas/NetworkResponse"
    NetworkResponseReceivedEvent:
      type: object
      additionalProperties: true
      required: [requestId, response]
      properties:
        requestId:
          type: string
        loaderId:
          type: string
        type:
          type: string
        response:
          $ref: "#/components/schemas/NetworkResponse"
    NetworkLoadingFinishedEvent:
      type: object
      additionalProperties: true
      required: [requestId]
      properties:
        requestId:
          type: string
    NetworkLoadingFailedEvent:
      type: object
      additionalProperties: true
      required: [requestId]
      properties:
        requestId:
          type: string
        type:
          type: string
        errorText:
          type: string
        canceled:
          type: boolean
        blockedReason:
          type: string
    NetworkSetCacheDisabledParams:
      type: object
      additionalProperties: false
      required: [cacheDisabled]
      properties:
        cacheDisabled:
          type: boolean
    NetworkSetBypassServiceWorkerParams:
      type: object
      additionalProperties: false
      required: [bypass]
      properties:
        bypass:
          type: boolean
    NetworkSetExtraHTTPHeadersParams:
      type: object
      additionalProperties: false
      required: [headers]
      properties:
        headers:
          $ref: "#/components/schemas/CdpHeaders"
    NetworkGetResponseBodyParams:
      type: object
      additionalProperties: false
      required: [requestId]
      properties:
        requestId:
          type: string
    NetworkGetResponseBodyResult:
      type: object
      additionalProperties: false
      required: [body, base64Encoded]
      properties:
        body:
          type: string
        base64Encoded:
          type: boolean
    RuntimeEvaluateParams:
      type: object
      additionalProperties: false
      required: [expression, returnByValue, awaitPromise]
      properties:
        expression:
          type: string
        returnByValue:
          type: boolean
        awaitPromise:
          type: boolean
        contextId:
          type: integer
          format: int64
    RuntimeDomStateValue:
      type: object
      additionalProperties: false
      required: [finalUrl, html]
      properties:
        finalUrl:
          type: string
        title:
          type: string
        html:
          type: string
    RuntimeRemoteObjectWithDomState:
      type: object
      additionalProperties: true
      required: [value]
      properties:
        value:
          $ref: "#/components/schemas/RuntimeDomStateValue"
    RuntimeEvaluateDomStateResult:
      type: object
      additionalProperties: false
      required: [result]
      properties:
        result:
          $ref: "#/components/schemas/RuntimeRemoteObjectWithDomState"
    FetchHeaderEntry:
      type: object
      additionalProperties: false
      required: [name, value]
      properties:
        name:
          type: string
        value:
          type: string
    FetchRequestPattern:
      type: object
      additionalProperties: false
      properties:
        urlPattern:
          type: string
        resourceType:
          type: string
        requestStage:
          type: string
    FetchEnableParams:
      type: object
      additionalProperties: false
      properties:
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/FetchRequestPattern"
        handleAuthRequests:
          type: boolean
    FetchAuthChallenge:
      type: object
      additionalProperties: true
      properties:
        source:
          type: string
        origin:
          type: string
        scheme:
          type: string
        realm:
          type: string
    FetchAuthRequiredEvent:
      type: object
      additionalProperties: true
      required: [requestId, request, authChallenge]
      properties:
        requestId:
          type: string
        request:
          $ref: "#/components/schemas/NetworkRequest"
        frameId:
          type: string
        resourceType:
          type: string
        authChallenge:
          $ref: "#/components/schemas/FetchAuthChallenge"
    FetchRequestPausedEvent:
      type: object
      additionalProperties: true
      required: [requestId, request]
      properties:
        requestId:
          type: string
        request:
          $ref: "#/components/schemas/NetworkRequest"
        frameId:
          type: string
        resourceType:
          type: string
        responseErrorReason:
          type: string
        responseStatusCode:
          type: integer
          format: int64
        responseStatusText:
          type: string
        responseHeaders:
          type: array
          items:
            $ref: "#/components/schemas/FetchHeaderEntry"
        networkId:
          type: string
        redirectedRequestId:
          type: string
    FetchContinueRequestParams:
      type: object
      additionalProperties: false
      required: [requestId]
      properties:
        requestId:
          type: string
        url:
          type: string
        method:
          type: string
        postData:
          type: string
        headers:
          type: array
          items:
            $ref: "#/components/schemas/FetchHeaderEntry"
    FetchAuthChallengeResponse:
      type: object
      additionalProperties: false
      required: [response]
      properties:
        response:
          type: string
        username:
          type: string
        password:
          type: string
    FetchContinueWithAuthParams:
      type: object
      additionalProperties: false
      required: [requestId, authChallengeResponse]
      properties:
        requestId:
          type: string
        authChallengeResponse:
          $ref: "#/components/schemas/FetchAuthChallengeResponse"
    FetchFulfillRequestParams:
      type: object
      additionalProperties: false
      required: [requestId, responseCode]
      properties:
        requestId:
          type: string
        responseCode:
          type: integer
          format: int64
        responseHeaders:
          type: array
          items:
            $ref: "#/components/schemas/FetchHeaderEntry"
        body:
          type: string
        responsePhrase:
          type: string
