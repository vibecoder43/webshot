s3_mode: external
s3_bucket: webshot
s3_endpoint: "https://storage.yandexcloud.net/"
s3_region: "ru-central1"
public_base_url: "https://storage.yandexcloud.net/webshot"
s3_use_sts: true
s3_credentials_endpoint: "https://sts.yandexcloud.net/"
s3_credentials_duration_sec: 3600
s3_credentials_refresh_margin_sec: 300
s3_credentials_refresh_retry_sec: 60
allowlist_only: true
https_only: true
client_ip_source: trusted_header
client_ip_header_name: X-Forwarded-For
crawler_run_timeout_sec: 15
crawler_cpu_cores: 1
crawler_memory_gib: 1
crawler_job_overhead_timeout_sec: 45
crawler_post_load_delay_sec: 1
crawler_net_idle_wait_sec: 0
crawler_page_extra_delay_sec: 1
crawler_behavior_timeout_sec: 1
crawler_devtools_startup_timeout_sec: 15
crawler_cdp_handshake_timeout_sec: 10
crawler_cdp_command_timeout_sec: 10
crawler_size_limit_mib: 5
crawler_network_down_bytes_ratio_max: 10
crawler_local_fixture_rewrite: false
crawler_devtools_poll_interval_ms: 100
crawler_browser_stop_timeout_ms: 1500
crawler_proxy_stop_timeout_ms: 500
link_ratelimit_sec: 0
interval_ms: 500
pg_mode: local
pg_capture_meta_db_dsn: "postgresql://postgres@localhost:5432/webshot_prodlike_capture_meta_db"
pg_shared_state_db_dsn: "postgresql://postgres@localhost:5432/webshot_prodlike_shared_state_db"
secdist_path: secdist.json
