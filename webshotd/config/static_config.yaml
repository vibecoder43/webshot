components_manager:
  task_processors:
    main-task-processor:
      worker_threads: 4
      guess-cpu-limit: true
    purge_task_processor:
      worker_threads: 1
      thread_name: purge_task_processor_worker
    fs-task-processor:
      worker_threads: 1
    creds_refresh_task_processor:
      worker_threads: 1
      thread_name: creds_refresh_task_processor_worker
  default_task_processor: main-task-processor
  fs_task_processor: fs-task-processor
  components:
    http-client: {}
    http-client-core:
      fs-task-processor: fs-task-processor
      testsuite-timeout: 5s
    secdist: {}
    default-secdist-provider:
      config: $secdist_path
      missing-ok: true
      format: json
    process-starter: {}
    dynamic-config:
      defaults:
        USERVER_RPS_CCONTROL_ENABLED: true
        USERVER_FILES_CONTENT_TYPE_MAP:
          .css: text/css
          .gif: image/gif
          .htm: text/html
          .html: text/html
          .jpeg: image/jpeg
          .js: application/javascript
          .json: application/json
          .md: text/markdown
          .png: image/png
          .svg: image/svg+xml
          .yaml: application/yaml
          .yml: application/yaml
          __default__: text/plain
    config:
      url_bytes_max: 32768
      state_dir: $state_dir
      s3_bucket: $s3_bucket
      s3_endpoint: $s3_endpoint
      s3_region: $s3_region
      public_base_url: $public_base_url
      s3_timeout_ms: 3000
    dns-client:
      fs-task-processor: fs-task-processor
    testsuite-support: {}
    server:
      listener:
        port: 8080
        task_processor: main-task-processor
      listener-monitor:
        port: 8081
        task_processor: main-task-processor
    congestion-control:
      fake-mode: false
      load-enabled: true
    task-processors-load-monitor: {}
    metrics: {}
    logging:
      fs-task-processor: fs-task-processor
      loggers:
        default:
          file_path: '@stderr'
          level: debug
          overflow_behavior: discard
    handler-server-monitor:
      path: /service/monitor
      method: GET
      task_processor: main-task-processor
      format: prometheus-untyped
    denylist_check:
      path: /v1/denylist/check
      method: POST
      monitor-handler: true
      task_processor: main-task-processor
      request-timeout-ms: 2000
      max_request_size: &max-data-per-request 65536
    handler:
      path: /v1/capture
      method: GET,POST
      task_processor: main-task-processor
      request-timeout-ms: 60000
      max_request_size: *max-data-per-request
    by_prefix:
      path: /v1/capture/prefix
      method: GET
      task_processor: main-task-processor
      request-timeout-ms: 10000
      max_request_size: *max-data-per-request
    job_handler:
      path: /v1/capture/jobs/{uuid}
      method: GET
      task_processor: main-task-processor
      request-timeout-ms: 5000
      max_request_size: *max-data-per-request
    disallow_and_purge:
      path: /v1/denylist/disallow_and_purge
      method: POST
      monitor-handler: true
      task_processor: main-task-processor
      request-timeout-ms: 10000
      max_request_size: *max-data-per-request
    by_id:
      path: /v1/capture/{uuid}
      method: GET
      task_processor: main-task-processor
      request-timeout-ms: 10000
      max_request_size: *max-data-per-request
    docs:
      path: /rapidoc
      method: GET
      task_processor: main-task-processor
      request-timeout-ms: 10000
      max_request_size: *max-data-per-request
      title: Webshot API
      spec-url: /openapi/webshot.yaml
    docs_admin:
      path: /rapidoc
      method: GET
      monitor-handler: true
      task_processor: main-task-processor
      request-timeout-ms: 10000
      max_request_size: *max-data-per-request
      title: Webshot Admin API
      spec-url: /openapi/webshot.yaml
    rapidoc_assets_cache:
      dir: $rapidoc_assets_dir
      update-period: 0s
      fs-task-processor: fs-task-processor
    rapidoc_assets:
      path: /rapidoc-assets/*
      method: GET
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: rapidoc_assets_cache
      directory-file: ""
      not-found-file: ""
      expires: 0s
    rapidoc_assets_admin:
      path: /rapidoc-assets/*
      method: GET
      monitor-handler: true
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: rapidoc_assets_cache
      directory-file: ""
      not-found-file: ""
      expires: 0s
    openapi_cache:
      dir: $openapi_dir
      update-period: 0s
      fs-task-processor: fs-task-processor
    openapi_admin_cache:
      dir: $openapi_admin_dir
      update-period: 0s
      fs-task-processor: fs-task-processor
    openapi_static:
      path: /openapi/*
      method: GET
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: openapi_cache
      directory-file: ""
      not-found-file: ""
      expires: 0s
    openapi_admin:
      path: /openapi/*
      method: GET
      monitor-handler: true
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: openapi_admin_cache
      directory-file: ""
      not-found-file: ""
      expires: 0s
    ui_redirect:
      path: /ui
      method: GET
      task_processor: main-task-processor
      request-timeout-ms: 10000
      max_request_size: *max-data-per-request
    web_ui_cache:
      dir: $web_ui_dir
      update-period: 0s
      fs-task-processor: fs-task-processor
    web_ui_static:
      path: /ui/*
      method: GET
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: web_ui_cache
      directory-file: index.html
      not-found-file: ""
      expires: 0s
    crud:
      snapshots_page_max: 2
      snapshots_per_link_max: 2
      snapshots_links_per_page_max: 10
      crawler_run_timeout_sec: $crawler_run_timeout_sec
      crawler_cpu_cores: $crawler_cpu_cores
      crawler_memory_gib: $crawler_memory_gib
      crawler_job_overhead_timeout_sec: $crawler_job_overhead_timeout_sec
      crawler_post_load_delay_sec: $crawler_post_load_delay_sec
      crawler_net_idle_wait_sec: $crawler_net_idle_wait_sec
      crawler_page_extra_delay_sec: $crawler_page_extra_delay_sec
      crawler_behavior_timeout_sec: $crawler_behavior_timeout_sec
      crawler_devtools_startup_timeout_sec: $crawler_devtools_startup_timeout_sec
      crawler_cdp_handshake_timeout_sec: $crawler_cdp_handshake_timeout_sec
      crawler_cdp_command_timeout_sec: $crawler_cdp_command_timeout_sec
      crawler_size_limit_mib: $crawler_size_limit_mib
      crawler_network_down_bytes_ratio_max: $crawler_network_down_bytes_ratio_max
      crawler_local_fixture_rewrite: $crawler_local_fixture_rewrite
      crawler_devtools_poll_interval_ms: $crawler_devtools_poll_interval_ms
      crawler_cdp_wait_poll_interval_ms: $crawler_cdp_wait_poll_interval_ms
      crawler_browser_stop_timeout_ms: $crawler_browser_stop_timeout_ms
      crawler_proxy_stop_timeout_ms: $crawler_proxy_stop_timeout_ms
      link_cooldown_sec: $link_cooldown_sec
      crawl_job_retention_sec: 604800
      crawl_job_cleanup_interval_sec: 3600
      s3_credentials_endpoint: $s3_credentials_endpoint
      s3_credentials_endpoint#fallback: 'https://sts.example.com/'
      s3_use_sts: $s3_use_sts
      s3_credentials_duration_sec: $s3_credentials_duration_sec
      s3_credentials_duration_sec#fallback: 3600
      s3_credentials_refresh_margin_sec: $s3_credentials_refresh_margin_sec
      s3_credentials_refresh_margin_sec#fallback: 300
      s3_credentials_refresh_retry_sec: $s3_credentials_refresh_retry_sec
      s3_credentials_refresh_retry_sec#fallback: 60
      purge_job_timeout_sec: 10
      purge_delete_batch_size: 1000
    capture_meta_db:
      dbconnection: $pg_capture_meta_db_dsn
      blocking_task_processor: fs-task-processor
    shared_state_db:
      dbconnection: $pg_shared_state_db_dsn
      blocking_task_processor: fs-task-processor
    denylist:
