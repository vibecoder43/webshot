components_manager:
  task_processors:
    main-task-processor:
      worker_threads: $main_worker_threads
      worker_threads#fallback: 4
    purge_task_processor:
      worker_threads: 1
      thread_name: purge_task_processor_worker
    fs-task-processor:
      worker_threads: $fs_worker_threads
    creds_refresh_task_processor:
      worker_threads: 1
      thread_name: creds_refresh_task_processor_worker
  default_task_processor: main-task-processor
  fs_task_processor: fs-task-processor
  components:
    http-client: {}
    http-client-core:
      fs-task-processor: fs-task-processor
      testsuite-timeout: 5s
    secdist: {}
    default-secdist-provider:
      config: $secdist_path
      missing-ok: true
      format: json
    process-starter: {}
    default-server-middleware-pipeline-builder:
      append:
        - ws-exception-handling-middleware
    dynamic-config:
      defaults:
        USERVER_RPS_CCONTROL_ENABLED: true
        USERVER_FILES_CONTENT_TYPE_MAP:
          .css: text/css
          .gif: image/gif
          .htm: text/html
          .html: text/html
          .jpeg: image/jpeg
          .js: application/javascript
          .json: application/json
          .md: text/markdown
          .png: image/png
          .svg: image/svg+xml
          .yaml: application/yaml
          .yml: application/yaml
          __default__: text/plain
    config:
      url_bytes_max: 32768
      allowlist_only: $allowlist_only
      allowlist_only#fallback: true
      https_only: $https_only
      https_only#fallback: true
      state_dir: $state_dir
      client_ip_source: $client_ip_source
      client_ip_source#fallback: trusted_header
      client_ip_header_name: $client_ip_header_name
      client_ip_header_name#fallback: X-Forwarded-For
      s3_mode: $s3_mode
      s3_bucket: $s3_bucket
      s3_endpoint: $s3_endpoint
      s3_region: $s3_region
      public_base_url: $public_base_url
      s3_timeout_ms: 3000
    dns-client:
      fs-task-processor: fs-task-processor
    server:
      listener:
        port: 8080
        task_processor: main-task-processor
      listener-monitor:
        port: 8081
        task_processor: main-task-processor
    congestion-control:
      fake-mode: false
      load-enabled: true
    task-processors-load-monitor: {}
    metrics: {}
    logging:
      fs-task-processor: fs-task-processor
      loggers:
        default:
          file_path: '@stderr'
          level: debug
          overflow_behavior: discard
    handler-server-monitor:
      path: /service/monitor
      method: GET
      task_processor: main-task-processor
      format: prometheus-untyped
    denylist_check:
      path: /v1/denylist/check
      method: POST
      monitor-handler: true
      task_processor: main-task-processor
      request-timeout-ms: 2000
      max_request_size: &max-data-per-request 65536
    allowlist_check:
      path: /v1/allowlist/check
      method: POST
      monitor-handler: true
      task_processor: main-task-processor
      request-timeout-ms: 2000
      max_request_size: *max-data-per-request
    allowlist_add:
      path: /v1/allowlist/add
      method: POST
      monitor-handler: true
      task_processor: main-task-processor
      request-timeout-ms: 2000
      max_request_size: *max-data-per-request
    allowlist_remove:
      path: /v1/allowlist/remove
      method: POST
      monitor-handler: true
      task_processor: main-task-processor
      request-timeout-ms: 2000
      max_request_size: *max-data-per-request
    handler:
      path: /v1/capture
      method: GET,POST
      task_processor: main-task-processor
      request-timeout-ms: 60000
      max_request_size: *max-data-per-request
    by_prefix:
      path: /v1/capture/prefix
      method: GET
      task_processor: main-task-processor
      request-timeout-ms: 10000
      max_request_size: *max-data-per-request
    job_handler:
      path: /v1/capture/jobs/{uuid}
      method: GET
      task_processor: main-task-processor
      request-timeout-ms: 5000
      max_request_size: *max-data-per-request
    deny_and_purge:
      path: /v1/denylist/deny-and-purge
      method: POST
      monitor-handler: true
      task_processor: main-task-processor
      request-timeout-ms: 10000
      max_request_size: *max-data-per-request
    by_id:
      path: /v1/capture/{uuid}
      method: GET
      task_processor: main-task-processor
      request-timeout-ms: 10000
      max_request_size: *max-data-per-request
    docs:
      path: /rapidoc
      method: GET
      task_processor: main-task-processor
      request-timeout-ms: 10000
      max_request_size: *max-data-per-request
      title: Webshot API
      spec-url: /openapi/public/webshot.yaml
    docs_admin:
      path: /rapidoc
      method: GET
      monitor-handler: true
      task_processor: main-task-processor
      request-timeout-ms: 10000
      max_request_size: *max-data-per-request
      title: Webshot Admin API
      spec-url: /openapi/admin/webshot.yaml
    # WEBSHOT_TESTSUITE_COMPONENTS
    testsuite-support: {}
    rapidoc_assets_cache:
      dir: $rapidoc_assets_dir
      update-period: 0s
      fs-task-processor: fs-task-processor
    rapidoc_assets:
      path: /rapidoc-assets/*
      method: GET
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: rapidoc_assets_cache
      directory-file: ""
      not-found-file: ""
      expires: 0s
    rapidoc_assets_admin:
      path: /rapidoc-assets/*
      method: GET
      monitor-handler: true
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: rapidoc_assets_cache
      directory-file: ""
      not-found-file: ""
      expires: 0s
    openapi_public_cache:
      dir: $openapi_public_dir
      update-period: 0s
      fs-task-processor: fs-task-processor
    openapi_common_cache:
      dir: $openapi_common_dir
      update-period: 0s
      fs-task-processor: fs-task-processor
    openapi_admin_cache:
      dir: $openapi_admin_dir
      update-period: 0s
      fs-task-processor: fs-task-processor
    openapi_public_static:
      path: /openapi/public/*
      method: GET
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: openapi_public_cache
      directory-file: ""
      not-found-file: ""
      expires: 0s
    openapi_common_static:
      path: /openapi/common/*
      method: GET
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: openapi_common_cache
      directory-file: ""
      not-found-file: ""
      expires: 0s
    openapi_admin_static:
      path: /openapi/admin/*
      method: GET
      monitor-handler: true
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: openapi_admin_cache
      directory-file: ""
      not-found-file: ""
      expires: 0s
    openapi_admin_common_static:
      path: /openapi/common/*
      method: GET
      monitor-handler: true
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: openapi_common_cache
      directory-file: ""
      not-found-file: ""
      expires: 0s
    ui_replay:
      path: /vendor/replaywebpage/replay/{uuid}
      method: GET
      task_processor: main-task-processor
      request-timeout-ms: 10000
      max_request_size: *max-data-per-request
    web_ui_cache:
      dir: $web_ui_dir
      update-period: 0s
      fs-task-processor: fs-task-processor
    web_ui_vendor_cache:
      dir: $web_ui_vendor_dir
      update-period: 0s
      fs-task-processor: fs-task-processor
    web_ui_static:
      path: /vendor/*
      method: GET
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: web_ui_vendor_cache
      directory-file: ""
      not-found-file: ""
      expires: 0s
    web_ui_style_static:
      path: /style.css
      method: GET
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: web_ui_cache
      directory-file: style.css
      not-found-file: ""
      expires: 0s
    web_ui_index_static:
      path: /index.html
      method: GET
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: web_ui_cache
      directory-file: index.html
      not-found-file: ""
      expires: 0s
    web_ui_root_static:
      path: /
      method: GET
      task_processor: main-task-processor
      max_request_size: *max-data-per-request
      fs-cache-component: web_ui_cache
      directory-file: index.html
      not-found-file: ""
      expires: 0s
    crud:
      captures_page_max: 2
      captures_per_link_max: 2
      captures_links_per_page_max: 10
      crawler_run_timeout_sec: $crawler_run_timeout_sec
      crawler_run_timeout_sec#fallback: 15
      crawler_cpu_cores: $crawler_cpu_cores
      crawler_cpu_cores#fallback: 1
      crawler_memory_gib: $crawler_memory_gib
      crawler_memory_gib#fallback: 1
      crawler_job_overhead_timeout_sec: $crawler_job_overhead_timeout_sec
      crawler_job_overhead_timeout_sec#fallback: 45
      crawler_post_load_delay_sec: $crawler_post_load_delay_sec
      crawler_post_load_delay_sec#fallback: 1
      crawler_net_idle_wait_sec: $crawler_net_idle_wait_sec
      crawler_net_idle_wait_sec#fallback: 0
      crawler_page_extra_delay_sec: $crawler_page_extra_delay_sec
      crawler_page_extra_delay_sec#fallback: 1
      crawler_behavior_timeout_sec: $crawler_behavior_timeout_sec
      crawler_behavior_timeout_sec#fallback: 1
      crawler_devtools_startup_timeout_sec: $crawler_devtools_startup_timeout_sec
      crawler_devtools_startup_timeout_sec#fallback: 15
      crawler_cdp_handshake_timeout_sec: $crawler_cdp_handshake_timeout_sec
      crawler_cdp_handshake_timeout_sec#fallback: 10
      crawler_cdp_command_timeout_sec: $crawler_cdp_command_timeout_sec
      crawler_cdp_command_timeout_sec#fallback: 10
      crawler_size_limit_mib: $crawler_size_limit_mib
      crawler_size_limit_mib#fallback: 5
      crawler_network_down_bytes_ratio_max: $crawler_network_down_bytes_ratio_max
      crawler_network_down_bytes_ratio_max#fallback: 10
      crawler_local_fixture_rewrite: $crawler_local_fixture_rewrite
      crawler_local_fixture_rewrite#fallback: false
      crawler_devtools_poll_interval_ms: $crawler_devtools_poll_interval_ms
      crawler_devtools_poll_interval_ms#fallback: 100
      crawler_browser_stop_timeout_ms: $crawler_browser_stop_timeout_ms
      crawler_browser_stop_timeout_ms#fallback: 1500
      crawler_proxy_stop_timeout_ms: $crawler_proxy_stop_timeout_ms
      crawler_proxy_stop_timeout_ms#fallback: 500
      link_cooldown_sec: $link_cooldown_sec
      link_cooldown_sec#fallback: 0
      ip_cooldown_ms: $ip_cooldown_ms
      ip_cooldown_ms#fallback: 500
      crawl_job_retention_sec: 604800
      crawl_job_cleanup_interval_sec: 3600
      s3_credentials_endpoint: $s3_credentials_endpoint
      s3_credentials_endpoint#fallback: 'https://sts.example.com/'
      s3_use_sts: $s3_use_sts
      s3_credentials_duration_sec: $s3_credentials_duration_sec
      s3_credentials_duration_sec#fallback: 3600
      s3_credentials_refresh_margin_sec: $s3_credentials_refresh_margin_sec
      s3_credentials_refresh_margin_sec#fallback: 300
      s3_credentials_refresh_retry_sec: $s3_credentials_refresh_retry_sec
      s3_credentials_refresh_retry_sec#fallback: 60
      purge_job_timeout_sec: 10
      purge_delete_batch_size: 1000
    capture_meta_db:
      dbconnection: $pg_capture_meta_db_dsn
      blocking_task_processor: fs-task-processor
    shared_state_db:
      dbconnection: $pg_shared_state_db_dsn
      blocking_task_processor: fs-task-processor
    access_policy: {}
