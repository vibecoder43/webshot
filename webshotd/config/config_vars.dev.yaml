s3_mode: local
s3_bucket: webshot
s3_endpoint: "http://127.0.0.1:8333"
s3_region: "us-east-1"
public_base_url: "http://127.0.0.1:8333/webshot"
s3_use_sts: false
allowlist_only: false
https_only: false
pg_mode: local
pg_capture_meta_db_dsn: "postgresql://postgres@localhost:5432/webshot_dev_capture_meta_db"
pg_shared_state_db_dsn: "postgresql://postgres@localhost:5432/webshot_dev_shared_state_db"
crawler_run_timeout_sec: 30
crawler_cpu_cores: 1
crawler_memory_gib: 1
crawler_job_overhead_timeout_sec: 45
crawler_post_load_delay_sec: 1
crawler_net_idle_wait_sec: 0
crawler_page_extra_delay_sec: 1
crawler_behavior_timeout_sec: 1
crawler_devtools_startup_timeout_sec: 30
crawler_cdp_handshake_timeout_sec: 10
crawler_cdp_command_timeout_sec: 10
crawler_size_limit_mib: 50
crawler_network_down_bytes_ratio_max: 10
